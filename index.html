<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BugTrack</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="script.js"></script>
</head>

<body>

<header>
  <div class="logo">Bug<span>Track</span></div>
  <nav>
    <button class="nav-btn active" onclick="showView('board')">Board</button>
    <button class="nav-btn" onclick="showView('issues')">Issues</button>
    <button class="nav-btn" onclick="showView('people')">People</button>
    <button class="nav-btn" onclick="showView('projects')">Projects</button>
  </nav>
  <button class="btn btn-primary" onclick="openCreate()">+ New Issue</button>
</header>

<div class="container">

  <!-- BOARD -->
  <div id="view-board" class="view active">
    <div class="stats">
      <div class="stat"><div class="stat-label">Total</div><div class="stat-value" id="s-total">0</div></div>
      <div class="stat"><div class="stat-label">Open</div><div class="stat-value" id="s-open">0</div></div>
      <div class="stat"><div class="stat-label">Overdue</div><div class="stat-value" id="s-overdue">0</div></div>
      <div class="stat"><div class="stat-label">Resolved</div><div class="stat-value" id="s-resolved">0</div></div>
    </div>
    <div class="board">
      <div><div class="col-title">Backlog <span class="col-count" id="cc-backlog">0</span></div><div id="col-backlog"></div></div>
      <div><div class="col-title">Open <span class="col-count" id="cc-open">0</span></div><div id="col-open"></div></div>
      <div><div class="col-title">Overdue <span class="col-count" id="cc-overdue">0</span></div><div id="col-overdue"></div></div>
      <div><div class="col-title">Resolved <span class="col-count" id="cc-resolved">0</span></div><div id="col-resolved"></div></div>
    </div>
  </div>

  <!-- ISSUES -->
  <div id="view-issues" class="view">
    <div class="toolbar">
      <span class="page-title">All Issues</span>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="text" class="search" placeholder="Search…" oninput="filterIssues(this.value)">
        <button class="btn btn-primary" onclick="openCreate()">+ New Issue</button>
      </div>
    </div>
    <table>
      <thead><tr>
        <th>ID</th><th>Summary</th><th>Project</th><th>Assignee</th><th>Priority</th><th>Status</th><th>Target Date</th>
      </tr></thead>
      <tbody id="issues-tbody"></tbody>
    </table>
  </div>

  <!-- DETAIL -->
  <div id="view-detail" class="view">
    <button class="back-btn" onclick="showView('issues')">← Back</button>
    <div id="detail-content"></div>
  </div>

  <!-- PEOPLE -->
  <div id="view-people" class="view">
    <div class="toolbar">
      <span class="page-title">People</span>
    </div>
    <div class="people-grid" id="people-grid"></div>
  </div>

  <!-- PROJECTS -->
  <div id="view-projects" class="view">
    <div class="page-title" style="margin-bottom:14px">Projects</div>
    <div class="projects-grid" id="projects-grid"></div>
  </div>

</div>

<!-- CREATE/EDIT MODAL -->
<div class="overlay" id="issue-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">New Issue</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="form-grid">
      <div class="form-group form-full">
        <label>Summary *</label>
        <input type="text" id="f-summary" placeholder="Brief description">
      </div>
      <div class="form-group form-full">
        <label>Description</label>
        <textarea id="f-desc" placeholder="Full details…"></textarea>
      </div>
      <div class="form-group">
        <label>Project</label>
        <select id="f-project"></select>
      </div>
      <div class="form-group">
        <label>Assignee</label>
        <select id="f-assignee"></select>
      </div>
      <div class="form-group">
        <label>Identified By</label>
        <input type="text" id="f-identified-by">
      </div>
      <div class="form-group">
        <label>Date Identified</label>
        <input type="date" id="f-date-identified">
      </div>
      <div class="form-group">
        <label>Priority</label>
        <select id="f-priority">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="f-status">
          <option value="open" selected>Open</option>
          <option value="resolved">Resolved</option>
          <option value="overdue">Overdue</option>
        </select>
      </div>
      <div class="form-group">
        <label>Target Date</label>
        <input type="date" id="f-target-date">
      </div>
      <div class="form-group">
        <label>Actual Resolution Date</label>
        <input type="date" id="f-actual-date">
      </div>
      <div class="form-group form-full">
        <label>Resolution Summary</label>
        <textarea id="f-resolution" placeholder="How was it resolved?"></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveIssue()">Save</button>
    </div>
  </div>
</div>


</body>
</html>
